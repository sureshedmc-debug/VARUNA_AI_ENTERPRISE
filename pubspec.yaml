name: varuna_ai
description: VARUNA AI Drone Project
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  provider: ^6.1.5

  flutter_map: ^8.2.1
  flutter_map_location_marker: ^10.1.0
  latlong2: ^0.9.1

  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  percent_indicator: ^4.2.5

  lottie: ^3.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logos/
    - assets/images/
    - assets/icons/
    - assets/animations/